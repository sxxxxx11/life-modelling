    function t(key) {

    const defaultDailyRoutine = {

    const defaultDesiredFuture = { city: '', lifestyle: '', relationships: '', financial: '', health: '', dailySchedule: '' };

    let state = {
      currentStep: 'welcome',
      userProfile: {
        age: 25,
        dailyRoutine: JSON.parse(JSON.stringify(defaultDailyRoutine)),
        probeAnswers: [],
        desiredFuture: JSON.parse(JSON.stringify(defaultDesiredFuture)),

      pendingProbes: []

    function saveState() {
      try { localStorage.setItem(STORAGE_KEY, JSON.stringify(state)); } catch (e) {}
    }

    function loadState() {
      try {
        const saved = localStorage.getItem(STORAGE_KEY);
        if (saved) {
          const parsed = JSON.parse(saved);
          state = { ...state, ...parsed };
        }
      } catch (e) { console.warn('Failed to load state'); }
    }

    // ==================== UTILITIES ====================
    function parseTime(time) {
      const [h, m] = time.split(':').map(Number);
      return h * 60 + m;
    }

    function timeDiff(start, end) {
      let diff = parseTime(end) - parseTime(start);
      if (diff < 0) diff += 24 * 60;
      return diff / 60;
    }

    function calculateBaseScores(routine) {
      const sleepDuration = timeDiff(routine.sleep.bedtime, routine.sleep.wakeTime);
      const sleepScore = Math.max(0, Math.min(100, 100 - Math.abs(8 - sleepDuration) * 8 - (5 - routine.sleep.quality) * 10));

      const dietScore = 50 + (routine.diet.breakfast === 'always' ? 20 : routine.diet.breakfast === 'sometimes' ? 10 : 0)
                        + Math.min(10, routine.diet.waterCups * 2) - Math.min(20, routine.diet.snacksPerDay * 5);

      const exerciseScore = 30 + Math.min(30, routine.exercise.timesPerWeek * 6)
                             + Math.min(15, routine.exercise.duration / 2) - Math.max(0, (routine.exercise.sedentaryHours - 6) * 3);

      const workScore = 50 + Math.min(25, routine.work.focusHours * 5) + Math.min(15, routine.work.growthTime / 2)
                         - (routine.work.overtimeFreq === 'often' ? 15 : routine.work.overtimeFreq === 'sometimes' ? 5 : 0);

      const leisureScore = Math.max(0, 80 - routine.leisure.screenTime * 10 + routine.leisure.socialFreq * 5);

      return {
        health: sleepScore * 0.3 + dietScore * 0.25 + exerciseScore * 0.25 + (70 - routine.health.stressLevel * 5) * 0.2,
        finance: workScore * 0.7 + sleepScore * 0.15 + (70 - routine.health.stressLevel * 5) * 0.15,
        relationships: leisureScore * 0.4 + sleepScore * 0.3 + workScore * 0.15 + (70 - routine.health.stressLevel * 5) * 0.15,
        growth: workScore * 0.4 + sleepScore * 0.2 + leisureScore * 0.2 + exerciseScore * 0.2
      };
    }

    function getTrajectoryMonths(age) {
      // 根据年龄调整轨迹时间范围
      // 25岁以下：20年轨迹（25岁用户看20年后的自己=45岁）
      // 25-35岁：15年轨迹
      // 35-45岁：10年轨迹
      // 45-55岁：8年轨迹
      // 55岁以上：5年轨迹
      if (age < 25) return 240; // 20年
      if (age < 35) return 180; // 15年
      if (age < 45) return 120; // 10年
      if (age < 55) return 96;  // 8年
      return 60; // 5年
    }

    function getAgeInertiaFactor(age) {
      // 年龄调整惯性因子：年龄越大，习惯越难改变
      if (age < 25) return 0.98;  // 年轻人更容易改变
      if (age < 35) return 0.97;
      if (age < 45) return 0.96;
      if (age < 55) return 0.95;
      return 0.94; // 年龄越大，惯性越大
    }

    function generateTrajectory(routine, months = null) {
      const age = state.userProfile.age || 25;
      months = months || getTrajectoryMonths(age);

      const baseScores = calculateBaseScores(routine);
      const lifestyleQuality = (baseScores.overall) / 100; // 0-1，越高说明生活习惯越好

      const trajectory = [];
      let current = { ...baseScores };

      for (let month = 0; month <= months; month++) {
        const overall = current.health * 0.3 + current.finance * 0.3 + current.relationships * 0.2 + current.growth * 0.2;
        trajectory.push({
          month,
          health: Math.round(current.health),
          finance: Math.round(current.finance),
          relationships: Math.round(current.relationships),
          growth: Math.round(current.growth),
          overall: Math.round(overall)
        });

        // 每月变化：用更真实的模型
        // 趋势方向取决于：年龄 + 当前生活习惯质量 + 随机波动
        // 好习惯的人轨迹平稳甚至上升；差习惯的人逐渐下滑

        // 健康：受年龄影响最大，但运动可以减缓下滑
        const healthTrend = age > 40 ? -0.3 : (age > 25 ? -0.15 : 0.1);
        const exerciseEffect = routine.exercise.timesPerWeek > 2 ? 0.2 : (routine.exercise.timesPerWeek > 0 ? 0 : -0.2);
        current.health += healthTrend + exerciseEffect + (Math.random() - 0.5) * 2;

        // 财务：工作+成长时间多，则上升
        const financeTrend = routine.work.focusHours > 4 ? 0.25 : (routine.work.focusHours > 2 ? 0.1 : -0.1);
        current.finance += financeTrend + (Math.random() - 0.5) * 1.5;

        // 关系：屏幕时间少则改善
        const relationTrend = routine.leisure.screenTime < 3 ? 0.15 : (routine.leisure.screenTime > 5 ? -0.2 : 0);
        current.relationships += relationTrend + (Math.random() - 0.5) * 1.5;

        // 成长：学习时间多则上升，否则停滞
        const growthTrend = routine.work.growthTime > 60 ? 0.3 : (routine.work.growthTime > 30 ? 0.1 : -0.15);
        current.growth += growthTrend + (Math.random() - 0.5) * 2;

        // 边界限制
        current.health = Math.max(15, Math.min(100, current.health));
        current.finance = Math.max(15, Math.min(100, current.finance));
        current.relationships = Math.max(15, Math.min(100, current.relationships));
        current.growth = Math.max(15, Math.min(100, current.growth));
      }

    function calculateRealisticImprovement(coreParam, baseScores) {
      // 根据用户当前分数和核心参数，计算真实的改进幅度
      const scoreMap = { sleep: 'health', exercise: 'health', work: 'finance', growth: 'growth', leisure: 'relationships' };
      const metric = scoreMap[coreParam] || 'health';
      const score = baseScores[metric];

      // 根据当前分数决定改进幅度
      // < 40 分：大幅改进（20-25）
      // 40-60 分：中等改进（15-18）
      // > 60 分：小幅改进（10-12）
      if (score < 40) {
        return coreParam === 'growth' ? 25 : 22; // 成长/学习提升空间最大
      } else if (score < 60) {
        return coreParam === 'growth' ? 18 : 16;
      } else {
        return coreParam === 'growth' ? 12 : 10;
      }
    }

    function generateImprovedTrajectory(routine, coreParam, improvement, months = null) {
      const age = state.userProfile.age || 25;
      months = months || getTrajectoryMonths(age);

      const baseScores = calculateBaseScores(routine);
      const trajectory = [];
      let current = { ...baseScores };

      // 如果improvement未提供，根据用户当前分数计算
      if (!improvement || improvement === 15) {
        improvement = calculateRealisticImprovement(coreParam, baseScores);
      }

      // 应用改善：提升核心参数相关的维度
      switch (coreParam) {
        case 'sleep': current.health = Math.min(100, current.health + improvement * 0.8); break;
        case 'exercise': current.health = Math.min(100, current.health + improvement * 0.9); break;
        case 'work': current.finance = Math.min(100, current.finance + improvement * 0.8); break;
        case 'growth': current.growth = Math.min(100, current.growth + improvement * 0.9); break;
        case 'leisure': current.relationships = Math.min(100, current.relationships + improvement * 0.8); break;
      }

      // 改善后的生活习惯更好
      const improvedRoutine = JSON.parse(JSON.stringify(routine));
      if (coreParam === 'sleep') { improvedRoutine.sleep.quality = Math.min(10, improvedRoutine.sleep.quality + 1.5); }
      if (coreParam === 'exercise') { improvedRoutine.exercise.timesPerWeek += 1; }
      if (coreParam === 'work') { improvedRoutine.work.focusHours += 0.5; }
      if (coreParam === 'growth') { improvedRoutine.work.growthTime += 20; }
      if (coreParam === 'leisure') { improvedRoutine.leisure.screenTime = Math.max(0, improvedRoutine.leisure.screenTime - 1.5); }

      for (let month = 0; month <= months; month++) {
        const overall = current.health * 0.3 + current.finance * 0.3 + current.relationships * 0.2 + current.growth * 0.2;
        trajectory.push({
          month,
          health: Math.round(current.health),
          finance: Math.round(current.finance),
          relationships: Math.round(current.relationships),
          growth: Math.round(current.growth),
          overall: Math.round(overall)
        });

        // 改善后的轨迹：使用更科学真实的模型
        const healthTrend = age > 40 ? -0.25 : (age > 25 ? -0.1 : 0.15);
        const exerciseEffect = improvedRoutine.exercise.timesPerWeek > 2 ? 0.25 : (improvedRoutine.exercise.timesPerWeek > 0 ? 0 : -0.2);
        current.health += healthTrend + exerciseEffect + (Math.random() - 0.5) * 2;

        const financeTrend = improvedRoutine.work.focusHours > 4 ? 0.3 : (improvedRoutine.work.focusHours > 2 ? 0.15 : -0.05);
        current.finance += financeTrend + (Math.random() - 0.5) * 1.5;

        const relationTrend = improvedRoutine.leisure.screenTime < 3 ? 0.2 : (improvedRoutine.leisure.screenTime > 5 ? -0.15 : 0.05);
        current.relationships += relationTrend + (Math.random() - 0.5) * 1.5;

        const growthTrend = improvedRoutine.work.growthTime > 60 ? 0.35 : (improvedRoutine.work.growthTime > 30 ? 0.15 : -0.1);
        current.growth += growthTrend + (Math.random() - 0.5) * 2;

        current.health = Math.max(15, Math.min(100, current.health));
        current.finance = Math.max(15, Math.min(100, current.finance));
        current.relationships = Math.max(15, Math.min(100, current.relationships));
        current.growth = Math.max(15, Math.min(100, current.growth));
      }
      return trajectory;
    }

    function drawLineChart(canvasId, data, options = {}) {
      const canvas = document.getElementById(canvasId);
      if (!canvas) return;

      const ctx = canvas.getContext('2d');
      const dpr = window.devicePixelRatio || 1;

      const rect = canvas.getBoundingClientRect();
      canvas.width = rect.width * dpr;
      canvas.height = rect.height * dpr;
      ctx.scale(dpr, dpr);

      const width = rect.width;
      const height = rect.height;
      const padding = { top: 20, right: 20, bottom: 30, left: 40 };
      const chartWidth = width - padding.left - padding.right;
      const chartHeight = height - padding.top - padding.bottom;

      ctx.clearRect(0, 0, width, height);

      const age = state.userProfile.age || 25;
      const months = data.length > 1 ? data[data.length - 1].month : 36;
      const years = Math.round(months / 12);

      const labels = data.map((d, i) => {
        if (i === 0) return '现在';
        const yearNum = Math.round(d.month / 12);
        if (yearNum * 12 === d.month) return `${yearNum}年`;
        return `${d.month}月`;
      });
      const gridCount = 5;

      ctx.strokeStyle = '#38383F';
      ctx.lineWidth = 1;
      ctx.font = '11px Georgia';
      ctx.fillStyle = '#6B6B75';
      ctx.textAlign = 'right';

      for (let i = 0; i <= gridCount; i++) {
        const y = padding.top + (chartHeight / gridCount) * i;
        ctx.beginPath();
        ctx.moveTo(padding.left, y);
        ctx.lineTo(width - padding.right, y);
        ctx.stroke();

        const value = 100 - (100 / gridCount) * i;
        ctx.fillText(Math.round(value), padding.left - 8, y + 4);
      }

      ctx.textAlign = 'center';
      const step = Math.max(1, Math.floor(labels.length / 8));
      labels.forEach((label, i) => {
        if (i % step === 0 || i === labels.length - 1) {
          const x = padding.left + (chartWidth / (labels.length - 1)) * i;
          ctx.fillText(label, x, height - 8);
        }
      });

      const metricColors = {
        health: '#FB7185',
        finance: '#FBBF24',
        relationships: '#A78BFA',
        growth: '#22D3EE',
        overall: '#C9A0A0'
      };

      const metricsToDraw = options.metrics || ['overall'];

      metricsToDraw.forEach(metric => {
        if (!metricColors[metric]) return;

        ctx.beginPath();
        ctx.strokeStyle = metricColors[metric];
        ctx.lineWidth = 2.5;
        ctx.lineJoin = 'round';
        ctx.lineCap = 'round';

        data.forEach((point, i) => {
          const x = padding.left + (chartWidth / (data.length - 1)) * i;
          const y = padding.top + chartHeight - (point[metric] / 100) * chartHeight;

          if (i === 0) {
            ctx.moveTo(x, y);
          } else {
            ctx.lineTo(x, y);
          }
        });

        ctx.stroke();

        ctx.fillStyle = metricColors[metric];
        const lastPoint = data[data.length - 1];
        const lastX = padding.left + chartWidth;
        const lastY = padding.top + chartHeight - (lastPoint[metric] / 100) * chartHeight;
        ctx.beginPath();
        ctx.arc(lastX, lastY, 4, 0, Math.PI * 2);
        ctx.fill();
      });
    }

    function drawComparisonChart(canvasId, originalData, newData) {
      const canvas = document.getElementById(canvasId);
      if (!canvas) return;

      const ctx = canvas.getContext('2d');
      const dpr = window.devicePixelRatio || 1;

      const rect = canvas.getBoundingClientRect();
      canvas.width = rect.width * dpr;
      canvas.height = rect.height * dpr;
      ctx.scale(dpr, dpr);

      const width = rect.width;
      const height = rect.height;
      const padding = { top: 20, right: 20, bottom: 30, left: 40 };
      const chartWidth = width - padding.left - padding.right;
      const chartHeight = height - padding.top - padding.bottom;

      ctx.clearRect(0, 0, width, height);

      const labels = originalData.map((d, i) => {
        if (i === 0) return '现在';
        const yearNum = Math.round(d.month / 12);
        if (yearNum * 12 === d.month) return `${yearNum}年`;
        return `${d.month}月`;
      });
      const gridCount = 5;

      ctx.strokeStyle = '#38383F';
      ctx.lineWidth = 1;
      ctx.font = '11px Georgia';
      ctx.fillStyle = '#6B6B75';
      ctx.textAlign = 'right';

      for (let i = 0; i <= gridCount; i++) {
        const y = padding.top + (chartHeight / gridCount) * i;
        ctx.beginPath();
        ctx.moveTo(padding.left, y);
        ctx.lineTo(width - padding.right, y);
        ctx.stroke();

        const value = 100 - (100 / gridCount) * i;
        ctx.fillText(Math.round(value), padding.left - 8, y + 4);
      }

      ctx.textAlign = 'center';
      const step = Math.max(1, Math.floor(labels.length / 6));
      const lastIndex = labels.length - 1;
      labels.forEach((label, i) => {
        if (i === 0 || i === lastIndex || (i % step === 0 && i !== lastIndex - (lastIndex % step))) {
          const x = padding.left + (chartWidth / (labels.length - 1)) * i;
          ctx.fillText(label, x, height - 8);
        }
      });

      // Draw original trajectory
      ctx.beginPath();
      ctx.strokeStyle = '#6B6B75';
      ctx.lineWidth = 2;
      ctx.setLineDash([5, 5]);
      originalData.forEach((point, i) => {
        const x = padding.left + (chartWidth / (originalData.length - 1)) * i;
        const y = padding.top + chartHeight - (point.overall / 100) * chartHeight;
        if (i === 0) ctx.moveTo(x, y);
        else ctx.lineTo(x, y);
      });
      ctx.stroke();
      ctx.setLineDash([]);

      // Draw new trajectory
      ctx.beginPath();
      ctx.strokeStyle = '#C9A0A0';
      ctx.lineWidth = 2.5;
      newData.forEach((point, i) => {
        const x = padding.left + (chartWidth / (newData.length - 1)) * i;
        const y = padding.top + chartHeight - (point.overall / 100) * chartHeight;
        if (i === 0) ctx.moveTo(x, y);
        else ctx.lineTo(x, y);
      });
      ctx.stroke();

      // End points
      ctx.fillStyle = '#6B6B75';
      const origEnd = originalData[originalData.length - 1];
      ctx.beginPath();
      ctx.arc(padding.left + chartWidth, padding.top + chartHeight - (origEnd.overall / 100) * chartHeight, 4, 0, Math.PI * 2);
      ctx.fill();

      ctx.fillStyle = '#C9A0A0';
      const newEnd = newData[newData.length - 1];
      ctx.beginPath();
      ctx.arc(padding.left + chartWidth, padding.top + chartHeight - (newEnd.overall / 100) * chartHeight, 4, 0, Math.PI * 2);
      ctx.fill();
    }

              <canvas id="comparisonChart" class="w-full" style="height: 220px;"></canvas>

              <div class="flex justify-center gap-4 mt-4 text-sm">
                <div class="flex items-center gap-2"><div class="w-6 h-0.5" style="border-top: 2px dashed #6B6B75"></div><span>${t('microCompareOriginal')}</span></div>
                <div class="flex items-center gap-2"><div class="w-3 h-3 rounded bg-accent-pink"></div><span>${t('microCompareNew')}</span></div>
              </div>

              <div class="grid grid-cols-2 gap-4 mt-4">
                <div class="text-center p-3 bg-bg-tertiary rounded-lg">
                  <p class="text-xs text-text-muted mb-1"><span class="font-english">${years}${t('microCompareNoChange')}</p>
                  <p class="font-english text-xl font-bold text-text-muted">${currentFinal}</p>
                </div>
                <div class="text-center p-3 bg-bg-tertiary rounded-lg">
                  <p class="text-xs text-text-muted mb-1"><span class="font-english">${years}${t('microCompareWithChange')}</p>
                  <p class="font-english text-xl font-bold text-accent-pink">${newFinal}</p>
                </div>
              </div>
            </div>

            <div class="flex flex-col gap-3 animate-fade-in">
              <button onclick="goToStep('welcome'); resetApp();" class="bg-accent-pink text-bg-primary px-8 py-3.5 rounded-btn font-medium text-lg hover:bg-accent-pink/90 transition-all">
                ${t('microStartBtn')}
              </button>
              <div class="flex gap-3">
                <button onclick="goToStep('core')" class="flex-1 text-text-secondary hover:text-text-primary px-4 py-2 transition-colors border border-border rounded-btn">
                  ${t('microRestart')}
                </button>
                <button onclick="resetApp();" class="flex-1 text-text-secondary hover:text-text-primary px-4 py-2 transition-colors border border-border rounded-btn">
                  ${t('microReset')}
                </button>
              </div>
            </div>
          </div>
        </div>
      `;
    }

    // ==================== GLOBAL FUNCTIONS ====================
    window.goToStep = function(step) {
      state.currentStep = step;
      saveState();
      render();

      if (step === 'current') {
        setTimeout(() => {
          const routine = state.userProfile.dailyRoutine;
          const trajectory = generateTrajectory(routine);
          const sampled = trajectory.filter((_, i) => i % 3 === 0);
          drawLineChart('mainChart', sampled, { metrics: ['health', 'finance', 'relationships', 'growth'] });
        }, 100);
      }

      if (step === 'micro') {
        setTimeout(() => {
          const routine = state.userProfile.dailyRoutine;
          const coreParam = analyzeCoreParameter(routine, state.userProfile.desiredFuture);
          const baseScores = calculateBaseScores(routine);
          const improvement = calculateRealisticImprovement(coreParam.param, baseScores);
          const currentTrajectory = generateTrajectory(routine);
          const newTrajectory = generateImprovedTrajectory(routine, coreParam.param, improvement);

          const sampled = currentTrajectory.filter((_, i) => i % 3 === 0);
          const newSampled = newTrajectory.filter((_, i) => i % 3 === 0);

          drawComparisonChart('comparisonChart', sampled, newSampled);
        }, 100);
      }
    };

    window.resetApp = function() {
      if (confirm(t('resetConfirm'))) {
        localStorage.removeItem(STORAGE_KEY);
        state = {
          currentStep: 'welcome',
          userProfile: {
            age: 25,
            dailyRoutine: JSON.parse(JSON.stringify(defaultDailyRoutine)),
            probeAnswers: [],
            desiredFuture: JSON.parse(JSON.stringify(defaultDesiredFuture)),
            results: null
          },
          completedModules: [],
          pendingProbes: []
        };
        render();
      }
    };

    window.toggleModule = function(key) {
      const content = document.querySelector(`.module-content-${key}`);
      const arrow = document.querySelector(`.module-arrow-${key}`);
      if (content.style.display === 'none') {
        content.style.display = 'block';
        arrow.style.transform = 'rotate(180deg)';
      } else {
        content.style.display = 'none';
        arrow.style.transform = 'rotate(0deg)';
      }
    };

    window.updateRoutine = function(section, field, value) {
      state.userProfile.dailyRoutine[section][field] = value;
      saveState();
    };

    window.updateUserAge = function(age) {
      state.userProfile.age = age;
      saveState();
    };

    window.addEventListener('resize', function() {
      if (state.currentStep === 'current') {
        const routine = state.userProfile.dailyRoutine;
        const trajectory = generateTrajectory(routine);
        const sampled = trajectory.filter((_, i) => i % 3 === 0);
        drawLineChart('mainChart', sampled, { metrics: ['health', 'finance', 'relationships', 'growth'] });
      }
      if (state.currentStep === 'micro') {
        const routine = state.userProfile.dailyRoutine;
        const coreParam = analyzeCoreParameter(routine, state.userProfile.desiredFuture);
        const baseScores = calculateBaseScores(routine);
        const improvement = calculateRealisticImprovement(coreParam.param, baseScores);
        const currentTrajectory = generateTrajectory(routine);
        const newTrajectory = generateImprovedTrajectory(routine, coreParam.param, improvement);
        const sampled = currentTrajectory.filter((_, i) => i % 3 === 0);
        const newSampled = newTrajectory.filter((_, i) => i % 3 === 0);
        drawComparisonChart('comparisonChart', sampled, newSampled);
      }
    });

    // ==================== RENDER ====================
    function render() {
      const app = document.getElementById('app');

      let header = '';
      let footer = '';

      if (state.currentStep !== 'welcome') {
        header = `
          <header class="sticky top-0 z-50 bg-bg-primary/80 backdrop-blur-lg border-b border-border px-4 py-4">
            <div class="max-w-3xl mx-auto">
              <div class="flex items-center justify-between mb-4">
                <div class="flex items-center gap-2 font-bold text-lg text-text-primary">
                  <span class="font-english">Life Modelling</span>
                  <span class="text-accent-pink">${t('appSubtitle')}</span>
                </div>
                <div class="flex items-center gap-3">
                  <button onclick="toggleLang();" class="text-sm px-3 py-1.5 rounded-btn border border-border text-text-secondary hover:text-text-primary hover:border-accent-pink/50 transition-colors font-english">
                    ${currentLang === 'zh' ? 'EN' : '中'}
                  </button>
                  <button onclick="resetApp();" class="text-sm text-text-muted hover:text-text-secondary transition-colors">${t('footerRestart')}</button>
                </div>
              </div>
              ${ProgressIndicator()}
            </div>
          </header>
        `;
      } else {
        // Also show lang toggle on welcome page
        header = `
          <header class="fixed top-0 right-0 z-50 px-4 py-4">
            <button onclick="toggleLang();" class="text-sm px-3 py-1.5 rounded-btn border border-border text-text-secondary hover:text-text-primary hover:border-accent-pink/50 transition-colors font-english">
              ${currentLang === 'zh' ? 'EN' : '中'}
            </button>
          </header>
        `;
      }

      let content = '';
      switch (state.currentStep) {
        case 'welcome': content = renderWelcome(); break;
        case 'daily': content = renderDailyInput(); break;
        case 'probes': content = renderProbes(); break;
        case 'current': content = renderCurrentTrajectory(); break;
        case 'core': content = renderCoreParameter(); break;
        case 'micro': content = renderMicroAction(); break;
      }

      app.innerHTML = header + `<main class="flex-1">${content}</main>` + footer;
    }

    // ==================== INIT ====================
    loadState();
    render();
  </script>
</body>
</html>
