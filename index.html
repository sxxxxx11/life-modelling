<body>
  <div id="app"></div>

  <script>
    // ==================== APP STATE ====================
    const STORAGE_KEY = 'lifemodelling_state';

    const defaultDailyRoutine = {
      sleep: { bedtime: '23:30', wakeTime: '07:00', quality: 3, nightWakeups: 0, napHabit: 'sometimes' },
      diet: { breakfast: 'sometimes', lunchTime: '12:30', dinnerTime: '19:30', dinnerRegular: true, snacksPerDay: 2, waterCups: 5 },
      exercise: { timesPerWeek: 2, type: '', duration: 30, sedentaryHours: 8, avgSteps: 5000 },
      commute: { method: '', duration: 30, activity: '' },
      work: { type: '', focusHours: 4, overtimeFreq: 'sometimes', growthTime: 30 },
      leisure: { screenTime: 3, socialFreq: 2, aloneTime: 2, hobbies: [] },
      health: { checkupFreq: 'yearly', symptoms: [], stressLevel: 6 }
    };

    const defaultDesiredFuture = { city: '', lifestyle: '', relationships: '', financial: '', health: '', dailySchedule: '' };

    let state = {
      currentStep: 'welcome',
      userProfile: {
        age: 25,
        dailyRoutine: JSON.parse(JSON.stringify(defaultDailyRoutine)),
        probeAnswers: [],
        desiredFuture: JSON.parse(JSON.stringify(defaultDesiredFuture)),
        results: null
      },
      completedModules: [],
      pendingProbes: []
    };

    function saveState() {
      try { localStorage.setItem(STORAGE_KEY, JSON.stringify(state)); } catch (e) {}
    }

    function loadState() {
      try {
        const saved = localStorage.getItem(STORAGE_KEY);
        if (saved) {
          const parsed = JSON.parse(saved);
          state = { ...state, ...parsed };
        }
      } catch (e) { console.warn('Failed to load state'); }
    }

    // ==================== UTILITIES ====================
    function parseTime(time) {
      const [h, m] = time.split(':').map(Number);
      return h * 60 + m;
    }

    function timeDiff(start, end) {
      let diff = parseTime(end) - parseTime(start);
      if (diff < 0) diff += 24 * 60;
      return diff / 60;
    }

    function calculateBaseScores(routine) {
      const sleepDuration = timeDiff(routine.sleep.bedtime, routine.sleep.wakeTime);
      const sleepScore = Math.max(0, Math.min(100, 100 - Math.abs(8 - sleepDuration) * 8 - (5 - routine.sleep.quality) * 10));

      const dietScore = 50 + (routine.diet.breakfast === 'always' ? 20 : routine.diet.breakfast === 'sometimes' ? 10 : 0)
                        + Math.min(10, routine.diet.waterCups * 2) - Math.min(20, routine.diet.snacksPerDay * 5);

      const exerciseScore = 30 + Math.min(30, routine.exercise.timesPerWeek * 6)
                             + Math.min(15, routine.exercise.duration / 2) - Math.max(0, (routine.exercise.sedentaryHours - 6) * 3);

      const workScore = 50 + Math.min(25, routine.work.focusHours * 5) + Math.min(15, routine.work.growthTime / 2)
                         - (routine.work.overtimeFreq === 'often' ? 15 : routine.work.overtimeFreq === 'sometimes' ? 5 : 0);

      const leisureScore = Math.max(0, 80 - routine.leisure.screenTime * 10 + routine.leisure.socialFreq * 5);

      return {
        health: sleepScore * 0.3 + dietScore * 0.25 + exerciseScore * 0.25 + (70 - routine.health.stressLevel * 5) * 0.2,
        finance: workScore * 0.7 + sleepScore * 0.15 + (70 - routine.health.stressLevel * 5) * 0.15,
        relationships: leisureScore * 0.4 + sleepScore * 0.3 + workScore * 0.15 + (70 - routine.health.stressLevel * 5) * 0.15,
        growth: workScore * 0.4 + sleepScore * 0.2 + leisureScore * 0.2 + exerciseScore * 0.2
      };
    }

    function getTrajectoryMonths(age) {
      // 根据年龄调整轨迹时间范围
      // 25岁以下：20年轨迹（25岁用户看20年后的自己=45岁）
      // 25-35岁：15年轨迹
      // 35-45岁：10年轨迹
      // 45-55岁：8年轨迹
      // 55岁以上：5年轨迹
      if (age < 25) return 240; // 20年
      if (age < 35) return 180; // 15年
      if (age < 45) return 120; // 10年
      if (age < 55) return 96;  // 8年
      return 60; // 5年
    }

    function getAgeInertiaFactor(age) {
      // 年龄调整惯性因子：年龄越大，习惯越难改变
      if (age < 25) return 0.98;  // 年轻人更容易改变
      if (age < 35) return 0.97;
      if (age < 45) return 0.96;
      if (age < 55) return 0.95;
      return 0.94; // 年龄越大，惯性越大
    }

    function generateTrajectory(routine, months = null) {
      const age = state.userProfile.age || 25;
      months = months || getTrajectoryMonths(age);

      const baseScores = calculateBaseScores(routine);
      const lifestyleQuality = (baseScores.overall) / 100; // 0-1，越高说明生活习惯越好

      const trajectory = [];
      let current = { ...baseScores };

      for (let month = 0; month <= months; month++) {
        const overall = current.health * 0.3 + current.finance * 0.3 + current.relationships * 0.2 + current.growth * 0.2;
        trajectory.push({
          month,
          health: Math.round(current.health),
          finance: Math.round(current.finance),
          relationships: Math.round(current.relationships),
          growth: Math.round(current.growth),
          overall: Math.round(overall)
        });

        // 每月变化：用更真实的模型
        // 趋势方向取决于：年龄 + 当前生活习惯质量 + 随机波动
        // 好习惯的人轨迹平稳甚至上升；差习惯的人逐渐下滑

        // 健康：受年龄影响最大，但运动可以减缓下滑
        const healthTrend = age > 40 ? -0.3 : (age > 25 ? -0.15 : 0.1);
        const exerciseEffect = routine.exercise.timesPerWeek > 2 ? 0.2 : (routine.exercise.timesPerWeek > 0 ? 0 : -0.2);
        current.health += healthTrend + exerciseEffect + (Math.random() - 0.5) * 2;

        // 财务：工作+成长时间多，则上升
        const financeTrend = routine.work.focusHours > 4 ? 0.25 : (routine.work.focusHours > 2 ? 0.1 : -0.1);
        current.finance += financeTrend + (Math.random() - 0.5) * 1.5;

        // 关系：屏幕时间少则改善
        const relationTrend = routine.leisure.screenTime < 3 ? 0.15 : (routine.leisure.screenTime > 5 ? -0.2 : 0);
        current.relationships += relationTrend + (Math.random() - 0.5) * 1.5;

        // 成长：学习时间多则上升，否则停滞
        const growthTrend = routine.work.growthTime > 60 ? 0.3 : (routine.work.growthTime > 30 ? 0.1 : -0.15);
        current.growth += growthTrend + (Math.random() - 0.5) * 2;

        // 边界限制
        current.health = Math.max(15, Math.min(100, current.health));
        current.finance = Math.max(15, Math.min(100, current.finance));
        current.relationships = Math.max(15, Math.min(100, current.relationships));
        current.growth = Math.max(15, Math.min(100, current.growth));
      }
      return trajectory;
    }

    function analyzeCoreParameter(routine, desired) {
      const baseScores = calculateBaseScores(routine);
      const sleepDuration = timeDiff(routine.sleep.bedtime, routine.sleep.wakeTime);

      const parameters = [
        { param: 'sleep', name: '睡眠时间', score: Math.max(0, 100 - Math.abs(8 - sleepDuration) * 10 - (5 - routine.sleep.quality) * 10) },
        { param: 'exercise', name: '运动频率', score: Math.min(100, routine.exercise.timesPerWeek * 15 + routine.exercise.duration / 2) },
        { param: 'work', name: '工作专注度', score: Math.min(100, routine.work.focusHours * 12 + routine.work.growthTime / 2) },
        { param: 'growth', name: '个人成长时间', score: routine.work.growthTime * 2 + (routine.leisure.hobbies?.length > 0 ? 20 : 0) },
        { param: 'leisure', name: '休闲质量', score: Math.max(0, 80 - routine.leisure.screenTime * 10) }
      ];

      parameters.sort((a, b) => a.score - b.score);
      const core = parameters[0];

      const impactChains = {
        sleep: ['睡眠质量提升', '精力充沛', '专注力增强', '产出提高', '收入增长', '情绪稳定'],
        exercise: ['体能改善', '精力提升', '睡眠质量提高', '自信增强', '整体幸福感'],
        work: ['专业能力提升', '职业竞争力增强', '收入潜力提高', '自我价值感增强'],
        growth: ['技能增长', '职业发展', '收入提升', '自我实现'],
        leisure: ['压力缓解', '情绪健康', '人际关系', '生活满意度']
      };

      const affectedMetrics = {
        sleep: [{ metric: '健康', improvement: 15 }, { metric: '成长', improvement: 12 }, { metric: '关系', improvement: 8 }],
        exercise: [{ metric: '健康', improvement: 20 }, { metric: '成长', improvement: 7 }],
        work: [{ metric: '财务', improvement: 18 }, { metric: '成长', improvement: 15 }],
        growth: [{ metric: '成长', improvement: 25 }, { metric: '财务', improvement: 12 }],
        leisure: [{ metric: '关系', improvement: 15 }, { metric: '健康', improvement: 8 }]
      };

      const coreParamExplanations = {
        sleep: {
          what: '睡眠是人体修复和恢复的核心机制。睡眠质量直接影响第二天的精力、情绪稳定性和认知功能。',
          whyItMatters: '长期睡眠不足或睡眠质量差，会导致精力持续低迷、情绪波动、专注力下降，进而影响工作产出、人际关系和健康状况。这形成一个负向螺旋。',
          currentIssue: routine.sleep.quality < 4 ? '你的睡眠质量评分偏低，这正在悄悄侵蚀你的身心能量储备。' : '虽然你可能觉得还能扛住，但睡眠不足的影响是累积的。'
        },
        exercise: {
          what: '运动是激活身体机能、提升精力水平的最有效手段。每周运动次数和每次运动时长决定了你的基础体能状态。',
          whyItMatters: '缺乏运动会导致体能持续衰退、代谢减缓、精力不足，同时增加各类健康风险。运动还能提升情绪和认知功能。',
          currentIssue: routine.exercise.timesPerWeek < 3 ? '你目前的运动频率偏低，这正在导致你的基础体能逐渐下滑。' : '你的运动习惯有一定基础，但还有提升空间。'
        },
        work: {
          what: '工作专注度指的是你在工作时间内真正高效投入的程度。高专注力意味着单位时间内能完成更多高质量的工作。',
          whyItMatters: '专注力直接影响工作产出质量和职业竞争力。在知识经济时代，深度工作能力是稀缺资源。',
          currentIssue: routine.work.focusHours < 6 ? '你的每日专注工作时长偏短，可能被大量碎片化事务切割。' : '你的专注力有一定水平，但还有提升空间。'
        },
        growth: {
          what: '个人成长时间指的是你每天用于学习新知识、新技能的时间。这决定了你未来3年的能力和竞争力变化。',
          whyItMatters: '在快速变化的时代，持续学习是保持竞争力的关键。每天30分钟的学习，3年后会让你与同龄人拉开显著差距。',
          currentIssue: routine.work.growthTime < 30 ? '你每天用于个人成长的时间偏少，这会影响你的长期竞争力。' : '你有学习的习惯，但可以尝试更系统地规划。'
        },
        leisure: {
          what: '休闲质量指的是你如何度过工作之外的时光。高质量的休闲能恢复精力、维系关系、提升生活满意度。',
          whyItMatters: '过度刷手机会让人陷入低质量休息的陷阱，表面放松实际消耗精力。真正的休闲能让人充电。',
          currentIssue: routine.leisure.screenTime > 4 ? '你的屏幕时间偏长，可能陷入"垃圾娱乐"的陷阱，看似放松实则消耗精力。' : '你的休闲方式相对健康。'
        }
      };

      return {
        name: core.name,
        param: core.param,
        description: `${core.name}是最能撬动你人生的参数。当前得分 ${Math.round(core.score)}/100。`,
        impactChain: impactChains[core.param] || [],
        affectedMetrics: affectedMetrics[core.param] || [],
        reasoning: `在你当前的各项指标中，${core.name}的得分最低，提升空间最大。它是影响最广泛的基础参数。`,
        explanation: coreParamExplanations[core.param] || {}
      };
    }

    function generateMicroActions(routine, coreParam, baseScores, age) {
      // 根据用户真实数据计算各维度分数
      const sleepDuration = timeDiff(routine.sleep.bedtime, routine.sleep.wakeTime);
      const sleepScore = Math.max(0, Math.min(100, 100 - Math.abs(8 - sleepDuration) * 8 - (5 - routine.sleep.quality) * 10));
      const stressLevel = routine.health.stressLevel;
      const screenTime = routine.leisure.screenTime;
      const focusHours = routine.work.focusHours;
      const growthTime = routine.work.growthTime;

      // 根据分数决定行动难度梯度
      // 分数越低 → 行动越基础、门槛越低
      // 分数越高 → 行动更有挑战性、增量更大
      const getLevel = (score) => score < 40 ? 0 : score < 60 ? 1 : 2;

      const actions = {
        sleep: {
          0: [ // 睡眠很差 (< 40)
            { action: '睡前10分钟把手机放到客厅充电', trigger: '每晚睡前', duration: '1分钟', why: '你目前睡眠质量较低，屏幕蓝光是主要干扰源。从最简单的物理隔离开始。' },
            { action: '设一个"准备睡觉"提醒闹钟', trigger: '睡前30分钟', duration: '30秒', why: '你的睡眠时间可能不规律，一个温柔的提醒能帮你建立节奏。' },
            { action: '躺在床上后不做任何事，只是呼吸', trigger: '躺在床上时', duration: '5分钟', why: '睡不着时越焦虑越睡不着，只是呼吸是最小阻力的放松。' }
          ],
          1: [ // 睡眠中等 (40-60)
            { action: '把睡前例行公事化：洗澡→关灯→上床→阅读', trigger: '每晚固定时间', duration: '形成习惯后自动执行', why: '你已经有一定睡眠基础，建立固定流程能让身体自动进入睡眠模式。' },
            { action: '记录昨晚几点睡、几点起、睡了几分', trigger: '每天早上', duration: '30秒', why: '数据会说话。追踪一周后你会发现什么让睡眠变好或变差。' },
            { action: '睡前1小时把灯光调暗或开夜灯模式', trigger: '睡前1小时', duration: '自动完成', why: '你目前睡不好不差，亮度是容易被忽略的因素。' }
          ],
          2: [ // 睡眠较好 (> 60)
            { action: '保持现在的睡前习惯，偶尔提前5分钟上床', trigger: '感觉疲劳时', duration: '1分钟', why: '你的睡眠已经不错，维持+轻微优化即可，不需要大改变。' },
            { action: '尝试"重力毯"或厚被子看是否睡得更沉', trigger: '今晚睡觉时', duration: '尝试即有效', why: '你已经有好睡眠，探索什么让它从7分到9分。' },
            { action: '每周记录一次睡眠质量，找到最佳睡眠条件', trigger: '每周日', duration: '2分钟', why: '好上加好。你可以从数据中发现自己的"最优解"。' }
          ]
        },
        exercise: {
          0: [ // 运动很少 (< 40)
            { action: '坐电梯改为走楼梯1层', trigger: '每次坐电梯时', duration: '1分钟', why: '你目前的运动量很低，久坐是主要问题。从最微小的改变开始。' },
            { action: '喝水时站着喝完再坐下', trigger: '每次喝水时', duration: '30秒', why: '不需要专门运动，就打破久坐的状态就行。' },
            { action: '伸一个大大的懒腰', trigger: '久坐30分钟后', duration: '10秒', why: '激活身体，不用出汗，只要动就行。' }
          ],
          1: [ // 运动中等 (40-60)
            { action: '提前一站下车走路回去', trigger: '通勤时', duration: '10分钟', why: '你有一定运动基础，利用日常通勤可以轻松增加活动量。' },
            { action: '每天做3个深蹲（刷牙的时候）', trigger: '刷牙时', duration: '1分钟', why: '把运动嵌入已有的习惯里，不需要额外时间。' },
            { action: '周末去一次菜市场或超市步行', trigger: '周末', duration: '20分钟', why: '日常生活+轻度运动，一举两得。' }

          2: [ // 运动较多 (> 60)
            { action: '尝试一项你感兴趣的运动（跳舞、拳击、游泳）', trigger: '本周内', duration: '1次', why: '你已经能保持运动习惯，探索乐趣能让你更持续。' },
            { action: '把运动时间调整到你感觉最有精力的时段', trigger: '今后', duration: '找到最佳时间', why: '运动效率比时长更重要。找到你的黄金时段。' },
            { action: '每周尝试一个新运动或新路线', trigger: '每周', duration: '1次', why: '你的运动基础很好，变化能带来新鲜感和更多肌肉群锻炼。' }
          ]
        },
        work: {
          0: [ // 工作状态差 (< 40)
            { action: '工作前先打开待办事项写3个字', trigger: '每天开工前', duration: '1分钟', why: '你目前工作状态不佳，从最小行动开始建立节奏。' },
            { action: '每工作1小时后站起来伸展一下', trigger: '整点报时', duration: '1分钟', why: '中断不是浪费时间，是让大脑重启。' },
            { action: '把手机放在看不见的地方', trigger: '工作时', duration: '整段时间', why: '你可能没有意识到干扰从哪里来，先物理隔离。' }
          ],
          1: [ // 工作状态中等 (40-60)
            { action: '用"吃青蛙"法：早上先做最难的事', trigger: '每天早上', duration: '30分钟', why: '你有基础工作能力，但精力分配可以优化。' },
            { action: '设定3个今日小目标并打勾', trigger: '每天开工前', duration: '2分钟', why: '完成感是持续工作的燃料。' },
            { action: '给自己设置一个"完成信号"（如关电脑时说"今天做得不错"）', trigger: '每天下班时', duration: '10秒', why: '仪式感能帮你从工作状态切换到休息状态。' }

      const level = getLevel(paramScore);

    // 根据用户当前分数和核心参数，计算真实的改进幅度
    // 分数越低 → 改进空间越大；分数越高 → 边际收益递减
    function calculateRealisticImprovement(coreParam, baseScores) {
      const scoreMap = { sleep: 'health', exercise: 'health', work: 'finance', growth: 'growth', leisure: 'relationships' };
      const metric = scoreMap[coreParam] || 'health';
      const score = baseScores[metric];

      // 根据当前分数决定改进幅度
      // < 40 分：大幅改进（20-25）
      // 40-60 分：中等改进（15-18）
      // > 60 分：小幅改进（10-12）
      if (score < 40) {
        return coreParam === 'growth' ? 25 : 22; // 成长/学习提升空间最大
      } else if (score < 60) {
        return coreParam === 'growth' ? 18 : 16;
      } else {
        return coreParam === 'growth' ? 12 : 10;
      }
    }

    function generateImprovedTrajectory(routine, coreParam, improvement, months = null) {
      const age = state.userProfile.age || 25;
      months = months || getTrajectoryMonths(age);

      const baseScores = calculateBaseScores(routine);
      const trajectory = [];
      let current = { ...baseScores };

      // 如果improvement未提供，根据用户当前分数计算
      if (!improvement || improvement === 15) {
        improvement = calculateRealisticImprovement(coreParam, baseScores);
      }

      // 应用改善：提升核心参数相关的维度
      switch (coreParam) {
        case 'sleep': current.health = Math.min(100, current.health + improvement * 0.8); break;
        case 'exercise': current.health = Math.min(100, current.health + improvement * 0.9); break;
        case 'work': current.finance = Math.min(100, current.finance + improvement * 0.8); break;
        case 'growth': current.growth = Math.min(100, current.growth + improvement * 0.9); break;
        case 'leisure': current.relationships = Math.min(100, current.relationships + improvement * 0.8); break;
      }

      // 改善后的生活习惯更好
      const improvedRoutine = JSON.parse(JSON.stringify(routine));
      if (coreParam === 'sleep') { improvedRoutine.sleep.quality = Math.min(10, improvedRoutine.sleep.quality + 1.5); }
      if (coreParam === 'exercise') { improvedRoutine.exercise.timesPerWeek += 1; }
      if (coreParam === 'work') { improvedRoutine.work.focusHours += 0.5; }
      if (coreParam === 'growth') { improvedRoutine.work.growthTime += 20; }
      if (coreParam === 'leisure') { improvedRoutine.leisure.screenTime = Math.max(0, improvedRoutine.leisure.screenTime - 1.5); }

      for (let month = 0; month <= months; month++) {
        const overall = current.health * 0.3 + current.finance * 0.3 + current.relationships * 0.2 + current.growth * 0.2;
        trajectory.push({
          month,
          health: Math.round(current.health),
          finance: Math.round(current.finance),
          relationships: Math.round(current.relationships),
          growth: Math.round(current.growth),
          overall: Math.round(overall)
        });

        // 改善后的轨迹：使用更科学真实的模型
        const healthTrend = age > 40 ? -0.25 : (age > 25 ? -0.1 : 0.15);
        const exerciseEffect = improvedRoutine.exercise.timesPerWeek > 2 ? 0.25 : (improvedRoutine.exercise.timesPerWeek > 0 ? 0 : -0.2);
        current.health += healthTrend + exerciseEffect + (Math.random() - 0.5) * 2;

        const financeTrend = improvedRoutine.work.focusHours > 4 ? 0.3 : (improvedRoutine.work.focusHours > 2 ? 0.15 : -0.05);
        current.finance += financeTrend + (Math.random() - 0.5) * 1.5;

        const relationTrend = improvedRoutine.leisure.screenTime < 3 ? 0.2 : (improvedRoutine.leisure.screenTime > 5 ? -0.15 : 0.05);
        current.relationships += relationTrend + (Math.random() - 0.5) * 1.5;

        const growthTrend = improvedRoutine.work.growthTime > 60 ? 0.35 : (improvedRoutine.work.growthTime > 30 ? 0.15 : -0.1);
        current.growth += growthTrend + (Math.random() - 0.5) * 2;

        current.health = Math.max(15, Math.min(100, current.health));
        current.finance = Math.max(15, Math.min(100, current.finance));
        current.relationships = Math.max(15, Math.min(100, current.relationships));
        current.growth = Math.max(15, Math.min(100, current.growth));
      }
      return trajectory;
    }

    // ==================== LINE CHART RENDERER ====================
    function drawLineChart(canvasId, data, options = {}) {
      const canvas = document.getElementById(canvasId);
      if (!canvas) return;

      const ctx = canvas.getContext('2d');
      const dpr = window.devicePixelRatio || 1;

      const rect = canvas.getBoundingClientRect();
      canvas.width = rect.width * dpr;
      canvas.height = rect.height * dpr;
      ctx.scale(dpr, dpr);

      const width = rect.width;
      const height = rect.height;
      const padding = { top: 20, right: 20, bottom: 30, left: 40 };
      const chartWidth = width - padding.left - padding.right;
      const chartHeight = height - padding.top - padding.bottom;

      ctx.clearRect(0, 0, width, height);

      const age = state.userProfile.age || 25;
      const months = data.length > 1 ? data[data.length - 1].month : 36;
      const years = Math.round(months / 12);

      const labels = data.map((d, i) => {
        if (i === 0) return '现在';
        const yearNum = Math.round(d.month / 12);
        if (yearNum * 12 === d.month) return `${yearNum}年`;
        return `${d.month}月`;
      });
      const gridCount = 5;

      ctx.strokeStyle = '#38383F';
      ctx.lineWidth = 1;
      ctx.font = '11px Georgia';
      ctx.fillStyle = '#6B6B75';
      ctx.textAlign = 'right';

      for (let i = 0; i <= gridCount; i++) {
        const y = padding.top + (chartHeight / gridCount) * i;
        ctx.beginPath();
        ctx.moveTo(padding.left, y);
        ctx.lineTo(width - padding.right, y);
        ctx.stroke();

        const value = 100 - (100 / gridCount) * i;
        ctx.fillText(Math.round(value), padding.left - 8, y + 4);
      }

      ctx.textAlign = 'center';
      const step = Math.max(1, Math.floor(labels.length / 8));
      labels.forEach((label, i) => {
        if (i % step === 0 || i === labels.length - 1) {
          const x = padding.left + (chartWidth / (labels.length - 1)) * i;
          ctx.fillText(label, x, height - 8);
        }
      });

      const metricColors = {
        health: '#FB7185',
        finance: '#FBBF24',
        relationships: '#A78BFA',
        growth: '#22D3EE',
        overall: '#C9A0A0'
      };

      const metricsToDraw = options.metrics || ['overall'];

      metricsToDraw.forEach(metric => {
        if (!metricColors[metric]) return;

        ctx.beginPath();
        ctx.strokeStyle = metricColors[metric];
        ctx.lineWidth = 2.5;
        ctx.lineJoin = 'round';
        ctx.lineCap = 'round';

        data.forEach((point, i) => {
          const x = padding.left + (chartWidth / (data.length - 1)) * i;
          const y = padding.top + chartHeight - (point[metric] / 100) * chartHeight;

          if (i === 0) {
            ctx.moveTo(x, y);
          } else {
            ctx.lineTo(x, y);
          }
        });

        ctx.stroke();

        ctx.fillStyle = metricColors[metric];
        const lastPoint = data[data.length - 1];
        const lastX = padding.left + chartWidth;
        const lastY = padding.top + chartHeight - (lastPoint[metric] / 100) * chartHeight;
        ctx.beginPath();
        ctx.arc(lastX, lastY, 4, 0, Math.PI * 2);
        ctx.fill();
      });
    }

    function drawComparisonChart(canvasId, originalData, newData) {
      const canvas = document.getElementById(canvasId);
      if (!canvas) return;

      const ctx = canvas.getContext('2d');
      const dpr = window.devicePixelRatio || 1;

      const rect = canvas.getBoundingClientRect();
      canvas.width = rect.width * dpr;
      canvas.height = rect.height * dpr;
      ctx.scale(dpr, dpr);

      const width = rect.width;
      const height = rect.height;
      const padding = { top: 20, right: 20, bottom: 30, left: 40 };
      const chartWidth = width - padding.left - padding.right;
      const chartHeight = height - padding.top - padding.bottom;

      ctx.clearRect(0, 0, width, height);

      const labels = originalData.map((d, i) => {
        if (i === 0) return '现在';
        const yearNum = Math.round(d.month / 12);
        if (yearNum * 12 === d.month) return `${yearNum}年`;
        return `${d.month}月`;
      });
      const gridCount = 5;

      ctx.strokeStyle = '#38383F';
      ctx.lineWidth = 1;
      ctx.font = '11px Georgia';
      ctx.fillStyle = '#6B6B75';
      ctx.textAlign = 'right';

      for (let i = 0; i <= gridCount; i++) {
        const y = padding.top + (chartHeight / gridCount) * i;
        ctx.beginPath();
        ctx.moveTo(padding.left, y);
        ctx.lineTo(width - padding.right, y);
        ctx.stroke();

        const value = 100 - (100 / gridCount) * i;
        ctx.fillText(Math.round(value), padding.left - 8, y + 4);
      }

      ctx.textAlign = 'center';
      const step = Math.max(1, Math.floor(labels.length / 6));
      const lastIndex = labels.length - 1;
      labels.forEach((label, i) => {
        if (i === 0 || i === lastIndex || (i % step === 0 && i !== lastIndex - (lastIndex % step))) {
          const x = padding.left + (chartWidth / (labels.length - 1)) * i;
          ctx.fillText(label, x, height - 8);
        }
      });

      // Draw original trajectory
      ctx.beginPath();
      ctx.strokeStyle = '#6B6B75';
      ctx.lineWidth = 2;
      ctx.setLineDash([5, 5]);
      originalData.forEach((point, i) => {
        const x = padding.left + (chartWidth / (originalData.length - 1)) * i;
        const y = padding.top + chartHeight - (point.overall / 100) * chartHeight;
        if (i === 0) ctx.moveTo(x, y);
        else ctx.lineTo(x, y);
      });
      ctx.stroke();
      ctx.setLineDash([]);

      // Draw new trajectory
      ctx.beginPath();
      ctx.strokeStyle = '#C9A0A0';
      ctx.lineWidth = 2.5;
      newData.forEach((point, i) => {
        const x = padding.left + (chartWidth / (newData.length - 1)) * i;
        const y = padding.top + chartHeight - (point.overall / 100) * chartHeight;
        if (i === 0) ctx.moveTo(x, y);
        else ctx.lineTo(x, y);
      });
      ctx.stroke();

      // End points
      ctx.fillStyle = '#6B6B75';
      const origEnd = originalData[originalData.length - 1];
      ctx.beginPath();
      ctx.arc(padding.left + chartWidth, padding.top + chartHeight - (origEnd.overall / 100) * chartHeight, 4, 0, Math.PI * 2);
      ctx.fill();

      ctx.fillStyle = '#C9A0A0';
      const newEnd = newData[newData.length - 1];
      ctx.beginPath();
      ctx.arc(padding.left + chartWidth, padding.top + chartHeight - (newEnd.overall / 100) * chartHeight, 4, 0, Math.PI * 2);
      ctx.fill();
    }

        <div class="min-h-screen px-4 py-8">
          <div class="max-w-3xl mx-auto">
            <div class="mb-8 text-center animate-fade-in">
              <div class="text-4xl mb-4">◎</div>
              <h1 class="text-2xl font-bold text-text-primary mb-2">你的微行动方案</h1>
              <p class="text-text-secondary max-w-md mx-auto">
                针对"${coreParam.name}"，我们为你设计了每天可以轻松执行的动作
              </p>
            </div>

            <div class="bg-bg-secondary rounded-card border border-accent-pink/30 p-4 mb-6 animate-fade-in">
              <div class="flex items-start gap-3">
                <span class="text-xl">!</span>
                <div>
                  <h3 class="font-medium text-accent-pink mb-1">设计原则</h3>
                  <p class="text-sm text-text-secondary">
                    这些动作极其简单，2分钟内可完成，不依赖意志力，融入现有习惯。
                    目标：让你不可能失败。
                  </p>
                </div>
              </div>
            </div>

            <div class="space-y-3 mb-8">
              ${microActions.map((action, i) => `
                <div class="bg-bg-secondary rounded-card border border-border p-5 animate-fade-in" style="animation-delay: ${0.1 * i}s">
                  <div class="flex items-start gap-4">
                    <div class="w-8 h-8 rounded-full bg-accent-pink/20 flex items-center justify-center flex-shrink-0">
                      <span class="font-english text-accent-pink font-bold">${i + 1}</span>
                    </div>
                    <div class="flex-1">
                      <h3 class="font-medium text-text-primary mb-2">${action.action}</h3>
                      <div class="flex flex-wrap gap-3 text-sm">
                        <div class="flex items-center gap-1 text-text-muted">
                          <span>→</span><span>${action.trigger}</span>
                        </div>
                        <div class="flex items-center gap-1 text-text-muted">
                          <span>⏱</span><span class="font-english">${action.duration}</span>
                        </div>
                      </div>
                      <p class="mt-2 text-sm text-text-secondary bg-bg-tertiary p-2 rounded border-l-2 border-accent-pink/50">💡 ${action.why}</p>
                    </div>
                  </div>
                </div>
              `).join('')}
            </div>

            <div class="bg-bg-secondary rounded-card border border-border p-6 mb-6 animate-fade-in">
              <div class="flex items-center gap-2 mb-2">
                <span class="text-xl">↗</span>
                <h3 class="font-semibold text-text-primary">改变后的新轨迹</h3>
              </div>
              <p class="text-xs text-text-muted mb-4">虚线是原始轨迹（不改变），实线是新轨迹（执行微行动后）</p>

              <canvas id="comparisonChart" class="w-full" style="height: 220px;"></canvas>

              <div class="flex justify-center gap-4 mt-4 text-sm">
                <div class="flex items-center gap-2"><div class="w-6 h-0.5" style="border-top: 2px dashed #6B6B75"></div><span>原始轨迹</span></div>
                <div class="flex items-center gap-2"><div class="w-3 h-3 rounded bg-accent-pink"></div><span>新轨迹</span></div>
              </div>

              <div class="grid grid-cols-2 gap-4 mt-4">
                <div class="text-center p-3 bg-bg-tertiary rounded-lg">
                  <p class="text-xs text-text-muted mb-1"><span class="font-english">${years}年</span>后（不变）</p>
                  <p class="font-english text-xl font-bold text-text-muted">${currentFinal}</p>
                </div>
                <div class="text-center p-3 bg-bg-tertiary rounded-lg">
                  <p class="text-xs text-text-muted mb-1"><span class="font-english">${years}年</span>后（改变后）</p>
                  <p class="font-english text-xl font-bold text-accent-pink">${newFinal}</p>
                </div>
              </div>
            </div>

            <div class="flex flex-col gap-3 animate-fade-in">
              <button onclick="goToStep('welcome'); resetApp();" class="bg-accent-pink text-bg-primary px-8 py-3.5 rounded-btn font-medium text-lg hover:bg-accent-pink/90 transition-all">
                开始执行 ✧
              </button>
              <div class="flex gap-3">
                <button onclick="goToStep('core')" class="flex-1 text-text-secondary hover:text-text-primary px-4 py-2 transition-colors border border-border rounded-btn">
                  ← 上一步
                </button>
                <button onclick="resetApp();" class="flex-1 text-text-secondary hover:text-text-primary px-4 py-2 transition-colors border border-border rounded-btn">
                  🔄 重新开始
                </button>
              </div>
            </div>
          </div>
        </div>
      `;
    }

    // ==================== GLOBAL FUNCTIONS ====================
    window.goToStep = function(step) {
      state.currentStep = step;
      saveState();
      render();

      if (step === 'current') {
        setTimeout(() => {
          const routine = state.userProfile.dailyRoutine;
          const trajectory = generateTrajectory(routine);
          const sampled = trajectory.filter((_, i) => i % 3 === 0);
          drawLineChart('mainChart', sampled, { metrics: ['health', 'finance', 'relationships', 'growth'] });
        }, 100);
      }

      if (step === 'micro') {
        setTimeout(() => {
          const routine = state.userProfile.dailyRoutine;
          const coreParam = analyzeCoreParameter(routine, state.userProfile.desiredFuture);
          const baseScores = calculateBaseScores(routine);
          const improvement = calculateRealisticImprovement(coreParam.param, baseScores);
          const currentTrajectory = generateTrajectory(routine);
          const newTrajectory = generateImprovedTrajectory(routine, coreParam.param, improvement);

          const sampled = currentTrajectory.filter((_, i) => i % 3 === 0);
          const newSampled = newTrajectory.filter((_, i) => i % 3 === 0);

          drawComparisonChart('comparisonChart', sampled, newSampled);
        }, 100);
      }
    };

    window.resetApp = function() {
      if (confirm('确定要重新开始吗？所有数据将被清除。')) {
        localStorage.removeItem(STORAGE_KEY);
        state = {
          currentStep: 'welcome',
          userProfile: {
            age: 25,
            dailyRoutine: JSON.parse(JSON.stringify(defaultDailyRoutine)),
            probeAnswers: [],
            desiredFuture: JSON.parse(JSON.stringify(defaultDesiredFuture)),
            results: null
          },
          completedModules: [],
          pendingProbes: []
        };
        render();
      }
    };

    window.toggleModule = function(key) {
      const content = document.querySelector(`.module-content-${key}`);
      const arrow = document.querySelector(`.module-arrow-${key}`);
      if (content.style.display === 'none') {
        content.style.display = 'block';
        arrow.style.transform = 'rotate(180deg)';
      } else {
        content.style.display = 'none';
        arrow.style.transform = 'rotate(0deg)';
      }
    };

    window.updateRoutine = function(section, field, value) {
      state.userProfile.dailyRoutine[section][field] = value;
      saveState();
    };

    window.updateUserAge = function(age) {
      state.userProfile.age = age;
      saveState();
    };

    window.addEventListener('resize', function() {
      if (state.currentStep === 'current') {
        const routine = state.userProfile.dailyRoutine;
        const trajectory = generateTrajectory(routine);
        const sampled = trajectory.filter((_, i) => i % 3 === 0);
        drawLineChart('mainChart', sampled, { metrics: ['health', 'finance', 'relationships', 'growth'] });
      }
      if (state.currentStep === 'micro') {
        const routine = state.userProfile.dailyRoutine;
        const coreParam = analyzeCoreParameter(routine, state.userProfile.desiredFuture);
        const baseScores = calculateBaseScores(routine);
        const improvement = calculateRealisticImprovement(coreParam.param, baseScores);
        const currentTrajectory = generateTrajectory(routine);
        const newTrajectory = generateImprovedTrajectory(routine, coreParam.param, improvement);
        const sampled = currentTrajectory.filter((_, i) => i % 3 === 0);
        const newSampled = newTrajectory.filter((_, i) => i % 3 === 0);
        drawComparisonChart('comparisonChart', sampled, newSampled);
      }
    });

    // ==================== RENDER ====================
    function render() {
      const app = document.getElementById('app');

      let header = '';
      let footer = '';

      if (state.currentStep !== 'welcome') {
        header = `
          <header class="sticky top-0 z-50 bg-bg-primary/80 backdrop-blur-lg border-b border-border px-4 py-4">
            <div class="max-w-3xl mx-auto">
              <div class="flex items-center justify-between mb-4">
                <div class="flex items-center gap-2 font-bold text-lg text-text-primary">
                  <span class="text-xl">◇</span>
                  <span class="font-english">Life Modelling</span>
                  <span class="text-accent-pink">改写你的人生底层代码</span>
                </div>
                <button onclick="resetApp();" class="text-sm text-text-muted hover:text-text-secondary transition-colors">重新开始</button>
              </div>
              ${ProgressIndicator()}
            </div>
          </header>
        `;
      }

      let content = '';
      switch (state.currentStep) {
        case 'welcome': content = renderWelcome(); break;
        case 'daily': content = renderDailyInput(); break;
        case 'probes': content = renderProbes(); break;
        case 'current': content = renderCurrentTrajectory(); break;
        case 'core': content = renderCoreParameter(); break;
        case 'micro': content = renderMicroAction(); break;
      }

      app.innerHTML = header + `<main class="flex-1">${content}</main>` + footer;
    }

    // ==================== INIT ====================
    loadState();
    render();
  </script>
</body>
</html>
